{% load render_table from django_tables2 %}
{% load bootstrap5 %}

{% block content %}

        <form action="" method="get" class="form form-inline">
            {% bootstrap_form filter.form %}
            {% bootstrap_button 'filter' %}
        </form>
    {% endif %}
    {% render_table table %}
{% endblock %}
